name: Setup EWDK

on: [push, pull_request]

jobs:
  install-ewdk:
    runs-on: windows-latest
    steps:
      - name: Start Timer
        id: timer_start
        run: echo "start_time=$(Get-Date -Format o)" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Clean existing ISO
        run: |
          if (Test-Path C:\EWDK.iso) { Remove-Item C:\EWDK.iso -Force }
        shell: pwsh

      - name: Download EWDK ISO (official link)
        shell: pwsh
        run: |
          $ewdkUrl = "https://download.microsoft.com/download/9/f/e/9feb8234-0625-4ef8-96fc-7a6ff85fd3ed/wdk/wdksetup.iso"
          $ewdkIso = "C:\\EWDK.iso"
          $maxRetries = 3
          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              Start-BitsTransfer -Source $ewdkUrl -Destination $ewdkIso
              if ((Get-Item $ewdkIso).Length -lt 100MB) { throw "Too small." }
              break
            } catch {
              Remove-Item $ewdkIso -ErrorAction SilentlyContinue
              Start-Sleep -Seconds 5
              if ($i -eq $maxRetries) { throw "Download failed after $maxRetries attempts." }
            }
          }

      - name: Mount EWDK ISO
        shell: pwsh
        run: |
          # validation and mount steps
      - name: Copy contents
        shell: pwsh
        run: |
          # copy logic
      - name: Unmount ISO
        shell: pwsh
        run: |
          # dismount logic
      - name: Log Time & Size
        shell: pwsh
        run: |
          # timing and size logging
